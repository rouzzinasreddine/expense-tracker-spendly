<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed-variant": "#005236",
                        "on-secondary-fixed": "#002113",
                        "inverse-primary": "#494bd6",
                        "primary-fixed-dim": "#c0c1ff",
                        "secondary": "#4edea3",
                        "on-secondary-container": "#00311f",
                        "on-error": "#690005",
                        "surface-container-low": "#171c23",
                        "on-error-container": "#ffdad6",
                        "on-surface-variant": "#c7c4d7",
                        "primary-container": "#8083ff",
                        "outline": "#908fa0",
                        "surface-container-lowest": "#090f15",
                        "surface-container-high": "#252a32",
                        "secondary-container": "#00a572",
                        "background": "#0e141a",
                        "on-tertiary-fixed": "#40000d",
                        "primary-fixed": "#e1e0ff",
                        "surface-variant": "#30353d",
                        "secondary-fixed": "#6ffbbe",
                        "secondary-fixed-dim": "#4edea3",
                        "tertiary-container": "#ff516a",
                        "surface-container": "#1b2027",
                        "surface-container-highest": "#30353d",
                        "on-primary": "#1000a9",
                        "error-container": "#93000a",
                        "on-secondary": "#003824",
                        "error": "#ffb4ab",
                        "on-primary-fixed": "#07006c",
                        "inverse-surface": "#dee3ec",
                        "primary": "#c0c1ff",
                        "surface-tint": "#c0c1ff",
                        "on-primary-container": "#0d0096",
                        "tertiary": "#ffb2b7",
                        "inverse-on-surface": "#2c3138",
                        "on-surface": "#dee3ec",
                        "outline-variant": "#464554",
                        "tertiary-fixed": "#ffdadb",
                        "on-tertiary": "#67001b",
                        "tertiary-fixed-dim": "#ffb2b7",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "surface": "#0e141a",
                        "on-background": "#dee3ec",
                        "surface-dim": "#0e141a",
                        "on-tertiary-container": "#5b0017",
                        "surface-bright": "#343a41",
                        "on-tertiary-fixed-variant": "#92002a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "mono": ["JetBrains Mono"]
                    }
                },
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen">
<!-- Background Dashboard Simulation (Blurred) -->
<div class="fixed inset-0 z-0 flex blur-2xl opacity-40 pointer-events-none">
<!-- Predicted SideNavBar -->
<aside class="fixed left-0 top-0 h-full flex flex-col py-8 h-screen w-64 border-r border-slate-800/50 bg-slate-900/50 backdrop-blur-xl shadow-[0_0_40px_rgba(99,102,241,0.08)]">
<div class="px-8 mb-12">
<span class="text-2xl font-black tracking-tighter text-indigo-400">Spendly</span>
</div>
<nav class="flex-1 space-y-2">
<div class="text-indigo-400 font-bold border-r-2 border-indigo-400 pl-4 transition-all flex items-center gap-3 py-3">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="text-xs uppercase tracking-wider font-medium">Dashboard</span>
</div>
<div class="text-slate-400 hover:text-slate-200 pl-4 transition-all flex items-center gap-3 py-3">
<span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>
<span class="text-xs uppercase tracking-wider font-medium">Transactions</span>
</div>
</nav>
</aside>
<main class="ml-64 w-full p-12">
<div class="grid grid-cols-12 gap-8">
<div class="col-span-8 bg-surface-container rounded-xl h-64"></div>
<div class="col-span-4 bg-surface-container rounded-xl h-64"></div>
<div class="col-span-12 bg-surface-container rounded-xl h-96"></div>
</div>
</main>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-background/60 backdrop-blur-md p-4">
<!-- Transaction Modal Container -->
<div class="w-full max-w-xl bg-surface-container-low rounded-xl shadow-[0_0_60px_rgba(192,193,255,0.08)] border border-outline-variant/15 overflow-hidden">
<!-- Modal Header -->
<div class="px-8 pt-8 pb-6 flex justify-between items-start">
<div>
<h2 class="text-3xl font-bold tracking-tight text-on-surface">New Transaction</h2>
<p class="text-on-surface-variant text-sm mt-1">Record your latest financial activity</p>
</div>
<button class="p-2 hover:bg-surface-container-high rounded-full text-on-surface-variant transition-colors">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Transaction Type Toggle -->
<div class="px-8 mb-8">
<div class="flex p-1 bg-surface-container-lowest rounded-xl border border-outline-variant/10">
<button class="flex-1 py-3 px-4 rounded-lg bg-surface-container-highest text-primary font-bold transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="arrow_upward">arrow_upward</span>
                        Expense
                    </button>
<button class="flex-1 py-3 px-4 rounded-lg text-on-surface-variant hover:text-on-surface transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="arrow_downward">arrow_downward</span>
                        Income
                    </button>
</div>
</div>
<!-- Form Content -->
<form class="px-8 pb-8 space-y-6">
<!-- Title Input -->
<div class="space-y-2">
<label class="text-xs uppercase tracking-widest font-bold text-on-surface-variant/70 ml-1">Merchant / Description</label>
<input class="w-full bg-surface-container-high border-none rounded-xl px-4 py-4 text-on-surface placeholder:text-on-surface-variant/30 focus:ring-1 focus:ring-primary/30 transition-all" placeholder="e.g. Starbucks Reserve" type="text"/>
</div>
<!-- Amount & Category Grid -->
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="text-xs uppercase tracking-widest font-bold text-on-surface-variant/70 ml-1">Amount</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-mono">$</span>
<input class="w-full bg-surface-container-high border-none rounded-xl pl-8 pr-4 py-4 text-on-surface font-mono text-xl focus:ring-1 focus:ring-primary/30 transition-all" placeholder="0.00" step="0.01" type="number"/>
</div>
</div>
<div class="space-y-2">
<label class="text-xs uppercase tracking-widest font-bold text-on-surface-variant/70 ml-1">Category</label>
<div class="relative group">
<select class="w-full appearance-none bg-surface-container-high border-none rounded-xl px-4 py-4 text-on-surface focus:ring-1 focus:ring-primary/30 transition-all cursor-pointer">
<option>Dining &amp; Drinks</option>
<option>Transportation</option>
<option>Entertainment</option>
<option>Shopping</option>
<option>Utilities</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Date & Attachment -->
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="text-xs uppercase tracking-widest font-bold text-on-surface-variant/70 ml-1">Transaction Date</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-xl px-4 py-4 text-on-surface focus:ring-1 focus:ring-primary/30 transition-all [color-scheme:dark]" type="date"/>
</div>
</div>
<div class="space-y-2">
<label class="text-xs uppercase tracking-widest font-bold text-on-surface-variant/70 ml-1">Receipt Image</label>
<div class="w-full bg-surface-container-high border border-dashed border-outline-variant/30 rounded-xl px-4 py-4 flex items-center justify-center gap-2 cursor-pointer hover:border-primary/50 transition-colors group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary" data-icon="add_a_photo">add_a_photo</span>
<span class="text-sm text-on-surface-variant group-hover:text-on-surface">Upload Image</span>
</div>
</div>
</div>
<!-- Notes Section -->
<div class="space-y-2">
<label class="text-xs uppercase tracking-widest font-bold text-on-surface-variant/70 ml-1">Internal Note</label>
<textarea class="w-full bg-surface-container-high border-none rounded-xl px-4 py-4 text-on-surface placeholder:text-on-surface-variant/30 focus:ring-1 focus:ring-primary/30 transition-all resize-none" placeholder="Add details about this purchase..." rows="3"></textarea>
</div>
<!-- Primary Action -->
<div class="pt-4">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold py-5 rounded-xl flex items-center justify-center gap-3 shadow-[0_10px_30px_rgba(128,131,255,0.3)] hover:scale-[1.02] active:scale-[0.98] transition-all" type="submit">
<span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        Add Transaction
                    </button>
</div>
</form>
<!-- Bottom Brand Bar -->
<div class="bg-surface-container-highest px-8 py-4 flex items-center justify-between">
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-secondary"></div>
<span class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">Syncing with Chase Bank</span>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-sm text-on-surface-variant" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
<span class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">AES-256 Encrypted</span>
</div>
</div>
</div>
</div>
<!-- Hidden visual assets for context -->
<div class="hidden">
<img data-alt="close-up of high-quality navy textured paper with subtle metallic thread weave in moody studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB73IZ56E9z_D7QSucpI1LmG4ujvWtwi1Ooj-qn3-cxqb3f0o1f8xxz62oK1x7QMv0D_ldtt4N9wdEit1pL0OanoniCSo9miV957PKNKFfqwXXVHzTZ1suqT-XI554Z8YjRsiAaemvWAxpVw8zU9WBo6foe6qme72s_gSu1iVlmzAIW2BoJSccv_I0rkZN06wjKkY_XE6ux26X8AMBK3r-kXjQiBj-Sap5PjaMbk2MfB3giGDvYSRFmzwo1_MI3Z8w1MJpUCFAJ1w"/>
<img data-alt="abstract flowing 3d liquid metal indigo waves with soft purple highlights and dark shadows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBYxb1Wf5dVSvgspGeNX88MtR4QA1Io5zgUmfa9UTWsLh6MCEAz2cOvNAGjvIvUXZhPrUt2Bwrv4eKs1yM36IU9wyyDYlP4Xg2MdJfSD4qKe7j74RLI6xW2aIgcez1chizoRk53lN8aSbPO8wg7MfLlsVc44Ronb1oQ15697yIh1BIj2WgFexio2lw4PRIVSY_kwkVQkzv5yYp96eTo6lQKincn9BqU1y4wiOIFXEOxnT36ALLvnFaH0PHzIw_XA3Kqic7ZmKAzpQ"/>
</div>
</body></html>
